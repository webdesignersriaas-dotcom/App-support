name: flutter_support_tickets
description: Plug-and-play customer support ticket UI (list, create, chat) backed by a REST API.
version: 1.0.0
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  bot_toast: ^4.1.3
  intl: any
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
